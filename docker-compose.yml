version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: raasystem-backend
    ports:
      - "8000:8000"               # Host 8000 -> container 8000
    env_file:
      - .env
    volumes:
      - .:/usr/src/app            # live reload / code mounting
    command: ["node", "src/server.js"]
    restart: unless-stopped       # automatically restart if crashes
